name: CI

on:
  push:
    branches: [develop, main]
    tags: ['v*']
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 0xsolace/steward
  BUN_VERSION: "1.3.9"

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  build-docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [lint-test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish @stwd/sdk
        working-directory: packages/sdk
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN_0XSOLACE }}" > .npmrc
          npm publish --access public
        continue-on-error: true

      - name: Publish @stwd/eliza-plugin
        working-directory: packages/eliza-plugin
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN_0XSOLACE }}" > .npmrc
          npm publish --access public
        continue-on-error: true

      - name: Notify Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "📦 Steward Published"
          description: "Version: ${{ github.ref_name }}"
          color: 0x00ff00

  deploy-steward:
    name: Deploy to ${{ matrix.node.name }}
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        node:
          - { name: milady-core-1, ip: 88.99.66.168 }
          - { name: milady-core-2, ip: 178.63.251.122 }
          - { name: agent-node-1, ip: 37.27.190.196 }
          - { name: nyx-node, ip: 89.167.49.4 }
    steps:
      - name: Deploy to ${{ matrix.node.name }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.node.ip }}
          username: root
          key: ${{ secrets.AGENT_NODE_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "=== Deploying Steward to ${{ matrix.node.name }} ==="
            
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull new image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            # Stop existing container
            docker stop steward 2>/dev/null || true
            docker rm steward 2>/dev/null || true
            
            # Start new container
            docker run -d --name steward \
              --restart unless-stopped \
              -p 3200:3200 \
              -v /opt/steward:/data \
              -e DATABASE_URL="$(cat /opt/secrets/neon-db-url)" \
              -e STEWARD_TENANT_KEY="$(cat /opt/secrets/steward-tenant-key)" \
              -e STEWARD_MASTER_PASSWORD="$(cat /opt/secrets/steward-master-pw)" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            # Health check
            sleep 5
            curl -sf http://localhost:3200/health || exit 1
            
            echo "=== Deploy complete ==="

      - name: Notify Discord
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🤖 Steward Deployed"
          description: "Node: ${{ matrix.node.name }} (${{ matrix.node.ip }})"
          color: 0x00ff00

      - name: Notify Discord (Failure)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "❌ Steward Deploy Failed"
          description: "Node: ${{ matrix.node.name }} (${{ matrix.node.ip }})"
          color: 0xff0000
