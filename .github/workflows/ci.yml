name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter='*' build
        # Each package's "build" script runs `tsc --noEmit`

      - name: Test
        run: bun run test
        env:
          # Minimal env so packages that import @stwd/db or @stwd/vault
          # can load without crashing at module level
          DATABASE_URL: "postgresql://localhost:5432/steward_test"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
