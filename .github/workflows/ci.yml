name: CI

on:
  push:
    branches: [develop, main]

jobs:
  ci:
    name: Typecheck + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx turbo run build --filter=@stwd/api --filter=@stwd/proxy --filter=@stwd/sdk --filter=@stwd/react

      - name: Test (unit tests, no DB required)
        run: |
          bun test packages/sdk
          bun test packages/policy-engine
        env:
          STEWARD_MASTER_PASSWORD: "ci-test-secret"

  integration:
    name: Integration Tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true  # non-blocking until migration issues are resolved

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: steward
          POSTGRES_PASSWORD: steward_ci
          POSTGRES_DB: steward_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U steward"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (required for workspace imports)
        run: bunx turbo run build --filter=@stwd/api...

      - name: Run migrations
        run: bun packages/db/src/migrate.ts
        env:
          DATABASE_URL: "postgres://steward:steward_ci@localhost:5432/steward_test"

      - name: Integration tests (API)
        run: bun test packages/api
        env:
          DATABASE_URL: "postgres://steward:steward_ci@localhost:5432/steward_test"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
          STEWARD_PLATFORM_KEYS: "ci-platform-key"
          STEWARD_SESSION_SECRET: "ci-session-secret"
