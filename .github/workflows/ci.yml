name: CI

on:
  push:
    branches: [develop, main]

# Least-privilege default for all jobs. CI only lints/tests; nothing needs
# write access. Escalate per-job if that ever changes.
permissions:
  contents: read

jobs:
  ci:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  unit:
    name: Unit Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/sdk
          - packages/policy-engine
          - packages/vault
          - packages/auth
          - packages/proxy
          - packages/webhooks
          - packages/db
          - packages/shared

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace dependencies
        run: |
          PKG_NAME="@stwd/$(basename ${{ matrix.package }})"
          bunx turbo run build --filter="${PKG_NAME}..."

      - name: Test ${{ matrix.package }}
        # --isolate gives each test file a fresh global object so module
        # replacements installed via `mock.module()` in one file don't
        # leak into the next. Without this, e.g. zz-proxy-spend-limit's
        # `mock.module("@stwd/db")` stub poisoned every subsequent file
        # that imported the real `@stwd/db` schema. See issue #59.
        run: |
          if [ "${{ matrix.package }}" = "packages/sdk" ]; then
            mapfile -t sdk_tests < <(find packages/sdk/src -type f \( -name '*.test.ts' -o -name '*.spec.ts' \) | sort)
            bun test --isolate "${sdk_tests[@]}"
          else
            bun test --isolate ${{ matrix.package }}
          fi
        env:
          STEWARD_MASTER_PASSWORD: "ci-test-secret"

  unit-redis:
    name: Unit Tests (packages/redis)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REDIS_URL: "redis://localhost:6379"
      STEWARD_REDIS_TESTS: "1"

    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test packages/redis
        run: bun test --isolate packages/redis
        env:
          STEWARD_MASTER_PASSWORD: "ci-test-secret"

  integration:
    name: Integration Tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REDIS_URL: "redis://localhost:6379"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: steward
          POSTGRES_PASSWORD: steward_ci
          POSTGRES_DB: steward_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U steward"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (required for workspace imports)
        run: bunx turbo run build --filter=@stwd/api...

      - name: Run migrations
        run: bun packages/db/src/migrate.ts
        env:
          DATABASE_URL: "postgres://steward:steward_ci@localhost:5432/steward_test"

      - name: Start API test server
        env:
          DATABASE_URL: "postgres://steward:steward_ci@localhost:5432/steward_test"
          PORT: "3299"
          SKIP_MIGRATIONS: "1"
          STEWARD_BIND_HOST: "127.0.0.1"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
          STEWARD_PLATFORM_KEY: "ci-platform-key"
          STEWARD_PLATFORM_KEYS: "ci-platform-key"
          STEWARD_PLATFORM_KEY_SCOPES: '{"ci-platform-key":["platform:*"]}'
          ALLOW_USER_TENANT_CREATION: "true"
          STEWARD_JWT_SECRET: "ci-jwt-secret-must-be-at-least-32-chars-long"
          STEWARD_AUDIT_HMAC_KEY: "ci-audit-hmac-key-must-be-at-least-32-bytes-long"
          SIWE_ALLOWED_DOMAINS: "steward.fi,localhost"
        run: |
          bun run packages/api/src/index.ts > /tmp/steward-api-integration.log 2>&1 &
          echo $! > /tmp/steward-api-integration.pid
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3299/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/steward-api-integration.log
          exit 1

      - name: Integration tests (API)
        run: bun test --isolate --timeout=30000 packages/api
        env:
          DATABASE_URL: "postgres://steward:steward_ci@localhost:5432/steward_test"
          PORT: "3299"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
          STEWARD_PLATFORM_KEY: "ci-platform-key"
          STEWARD_PLATFORM_KEYS: "ci-platform-key"
          STEWARD_PLATFORM_KEY_SCOPES: '{"ci-platform-key":["platform:*"]}'
          ALLOW_USER_TENANT_CREATION: "true"
          STEWARD_JWT_SECRET: "ci-jwt-secret-must-be-at-least-32-chars-long"
          STEWARD_AUDIT_HMAC_KEY: "ci-audit-hmac-key-must-be-at-least-32-bytes-long"
          SIWE_ALLOWED_DOMAINS: "steward.fi,localhost"

      - name: Stop API test server
        if: always()
        run: |
          if [ -f /tmp/steward-api-integration.pid ]; then
            kill "$(cat /tmp/steward-api-integration.pid)" || true
          fi
          if [ -f /tmp/steward-api-integration.log ]; then
            cat /tmp/steward-api-integration.log
          fi

  e2e-smoke:
    name: E2E Smoke (Embedded)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REDIS_URL: "redis://localhost:6379"

    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start embedded API
        env:
          PORT: "3200"
          STEWARD_BIND_HOST: "127.0.0.1"
          STEWARD_PGLITE_PATH: "/tmp/steward-fi-e2e-pglite"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
          STEWARD_PLATFORM_KEY: "ci-platform-key"
          STEWARD_PLATFORM_KEYS: "ci-platform-key"
          STEWARD_PLATFORM_KEY_SCOPES: '{"ci-platform-key":["platform:*"]}'
          ALLOW_USER_TENANT_CREATION: "true"
          STEWARD_JWT_SECRET: "ci-jwt-secret-must-be-at-least-32-chars-long"
          STEWARD_AUDIT_HMAC_KEY: "ci-audit-hmac-key-must-be-at-least-32-bytes-long"
          SIWE_ALLOWED_DOMAINS: "steward.fi,localhost"
        run: |
          bun run start:local > /tmp/steward-fi-e2e.log 2>&1 &
          echo $! > /tmp/steward-fi-e2e.pid
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3200/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/steward-fi-e2e.log
          exit 1

      - name: Run e2e smoke
        env:
          STEWARD_URL: "http://127.0.0.1:3200"
          PLATFORM_KEY: "ci-platform-key"
        run: bun run test:e2e:smoke

      - name: Stop embedded API
        if: always()
        run: |
          if [ -f /tmp/steward-fi-e2e.pid ]; then
            kill "$(cat /tmp/steward-fi-e2e.pid)" || true
          fi
          if [ -f /tmp/steward-fi-e2e.log ]; then
            cat /tmp/steward-fi-e2e.log
          fi


  e2e-integration:
    name: E2E Integration (Compose)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start compose stack
        env:
          POSTGRES_DB: "steward_test"
          POSTGRES_USER: "steward"
          POSTGRES_PASSWORD: "steward_ci"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
          STEWARD_PLATFORM_KEY: "ci-platform-key"
          STEWARD_PLATFORM_KEYS: "ci-platform-key"
          STEWARD_PLATFORM_KEY_SCOPES: '{"ci-platform-key":["platform:*"]}'
          ALLOW_USER_TENANT_CREATION: "true"
          STEWARD_JWT_SECRET: "ci-jwt-secret-must-be-at-least-32-chars-long"
          STEWARD_AUDIT_HMAC_KEY: "fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210"
          STEWARD_KDF_SALT: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          STEWARD_ALLOW_INSECURE_DB: "true"
          # E2E scripts don't sign request-expiry headers; the feature stays on
          # in real production and is unit-tested separately.
          STEWARD_ALLOW_STALE_SENSITIVE_REQUESTS: "true"
          SIWE_ALLOWED_DOMAINS: "steward.fi,localhost"
          PORT: "3200"
          STEWARD_PROXY_PORT: "8080"
        run: |
          docker compose up -d --build postgres redis steward-api steward-proxy
          for url in http://127.0.0.1:3200/health http://127.0.0.1:8080/health; do
            for _ in $(seq 1 90); do
              if curl -sf "$url" >/dev/null; then
                break
              fi
              sleep 2
            done
            curl -sf "$url" >/dev/null
          done

      - name: Run e2e integration
        env:
          STEWARD_URL: "http://127.0.0.1:3200"
          PROXY_URL: "http://127.0.0.1:8080"
          PLATFORM_KEY: "ci-platform-key"
        run: bun run test:e2e:integration

      - name: Stop compose stack
        if: always()
        env:
          STEWARD_MASTER_PASSWORD: "ci-test-secret"
          STEWARD_PLATFORM_KEYS: "ci-platform-key"
          STEWARD_JWT_SECRET: "ci-jwt-secret-must-be-at-least-32-chars-long"
          STEWARD_AUDIT_HMAC_KEY: "ci-audit-hmac-key-must-be-at-least-32-bytes-long"
          STEWARD_KDF_SALT: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          POSTGRES_DB: "steward_test"
          POSTGRES_USER: "steward"
          POSTGRES_PASSWORD: "steward_ci"
        run: |
          docker compose logs steward-api steward-proxy redis postgres || true
          docker compose down -v
