name: PR Checks

on:
  pull_request:
    branches: [develop, main]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx turbo run build --filter=@stwd/api --filter=@stwd/proxy --filter=@stwd/sdk --filter=@stwd/react

      - name: Test
        run: |
          bun test packages/sdk
          bun test packages/policy-engine
          bun test packages/api
          bun test packages/vault
        env:
          DATABASE_URL: "postgresql://localhost:5432/steward_test"
          STEWARD_MASTER_PASSWORD: "ci-test-secret"

      - name: Check PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+"
          if ! echo "$TITLE" | grep -qE "$PATTERN"; then
            echo "::error::PR title must match conventional commits format"
            echo "Expected: type(scope): description"
            echo "Examples: feat(sdk): add new method, fix(api): handle edge case"
            echo "Got: $TITLE"
            exit 1
          fi
