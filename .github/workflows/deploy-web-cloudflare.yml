# Deploy the Steward web app to Cloudflare Workers (OpenNext adapter).
#
# Account: Shadowverse. Custom domains: steward.fi + www.steward.fi (zone on the
# same account). The Worker is "steward-web".
#
# Triggers:
#   1. Push to main touching web/** -> production deploy (gated by the
#      "cloudflare-web-production" environment, whose required reviewers are the
#      repo CODEOWNERS; a codeowner must approve the deployment before it runs).
#   2. Manual dispatch -> production deploy (same gate).
#   3. Pull request touching web/** -> dry-run build only (no upload), so CI
#      proves the Worker still bundles.
#
# Auth: CLOUDFLARE_API_TOKEN is a scoped token (Workers Scripts Write + KV Write
# + Account Settings Read on Shadowverse; DNS Write + Zone Read + Workers Routes
# Write on the steward.fi zone). CLOUDFLARE_ACCOUNT_ID is the Shadowverse id.
name: Deploy Web (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web-cloudflare.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/deploy-web-cloudflare.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, do not upload the Worker"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-web-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # On PRs, just prove the Worker bundles. No secrets, no upload.
  build-check:
    if: github.event_name == 'pull_request'
    name: Build check (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # OpenNext tooling needs Node; pin to 22 (Node 24 breaks its CLI deps).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Worker (OpenNext)
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_STEWARD_API_URL: "https://eliza.steward.fi"
        run: bun run cf:build
      - name: Validate Worker bundle (dry-run deploy)
        working-directory: web
        run: bunx wrangler deploy --dry-run --outdir /tmp/wrangler-dryrun

  # On main / manual dispatch, deploy. The environment gate requires a CODEOWNER
  # to approve before this job runs.
  deploy:
    if: github.event_name != 'pull_request'
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-web-production
      url: https://steward.fi
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create GitHub deployment
        id: deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: cloudflare-web-production
          ref: ${{ github.sha }}
          description: "Deploy steward-web to Cloudflare Workers"

      - name: Build Worker (OpenNext)
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_STEWARD_API_URL: "https://eliza.steward.fi"
        run: bun run cf:build

      - name: Deploy Worker
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: success
          environment-url: https://steward.fi

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: failure
