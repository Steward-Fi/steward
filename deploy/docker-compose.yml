# ──────────────────────────────────────────────────────────────────────────────
# Steward – Docker Compose for Milady node deployment
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
#
# Modes:
#   1. Managed Postgres (default) — spins up a local PG container
#   2. External DB (Neon, etc.)   — set DATABASE_URL in .env, comment out
#      the `steward-db` service and the `depends_on` block
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Steward API ──────────────────────────────────────────────────────────────
  steward:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: steward:latest
    container_name: steward
    restart: unless-stopped
    networks:
      - milady-isolated
    ports:
      - "3200:3200"
    environment:
      PORT: "3200"
      DATABASE_URL: "${DATABASE_URL:-postgresql://steward:steward@steward-db:5432/steward}"
      STEWARD_MASTER_PASSWORD: "${STEWARD_MASTER_PASSWORD:?Set STEWARD_MASTER_PASSWORD in .env}"
      RPC_URL: "${RPC_URL:-https://mainnet.base.org}"
      CHAIN_ID: "${CHAIN_ID:-8453}"
      STEWARD_PLATFORM_KEY: "${STEWARD_PLATFORM_KEY:-}"
      SOLANA_RPC_URL: "${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}"
    volumes:
      - steward-data:/app/data
    depends_on:
      steward-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://localhost:3200/health');process.exit(r.ok?0:1)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── PostgreSQL (managed) ─────────────────────────────────────────────────────
  steward-db:
    image: postgres:16-alpine
    container_name: steward-db
    restart: unless-stopped
    networks:
      - milady-isolated
    environment:
      POSTGRES_USER: steward
      POSTGRES_PASSWORD: steward
      POSTGRES_DB: steward
    volumes:
      - steward-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steward"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  steward-data:
    driver: local
  steward-pgdata:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
# Use the existing milady-isolated network on the node
networks:
  milady-isolated:
    external: true
