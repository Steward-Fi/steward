# ──────────────────────────────────────────────────────────────────────────────
# Steward – Docker Compose for Milady node deployment
#
# Services:
#   - steward:       API server (port 3200) — agent management, vault, policies
#   - steward-proxy: API proxy (port 8080) — intercepts LLM calls, injects keys
#   - steward-db:    PostgreSQL (internal) — managed database
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Steward API ──────────────────────────────────────────────────────────────
  steward:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: steward:latest
    container_name: steward
    restart: unless-stopped
    networks:
      - milady-isolated
    ports:
      - "3200:3200"
    environment:
      PORT: "3200"
      STEWARD_BIND_HOST: "0.0.0.0"
      DATABASE_URL: "${DATABASE_URL:-postgresql://steward:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@steward-db:5432/steward}"
      STEWARD_MASTER_PASSWORD: "${STEWARD_MASTER_PASSWORD:?Set STEWARD_MASTER_PASSWORD in .env}"
      STEWARD_JWT_SECRET: "${STEWARD_JWT_SECRET:-}"
      STEWARD_PLATFORM_KEYS: "${STEWARD_PLATFORM_KEYS:-}"
      RPC_URL: "${RPC_URL:-https://mainnet.base.org}"
      CHAIN_ID: "${CHAIN_ID:-8453}"
      STEWARD_PLATFORM_KEY: "${STEWARD_PLATFORM_KEY:-}"
      SOLANA_RPC_URL: "${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}"
    volumes:
      - steward-data:/app/data
    depends_on:
      steward-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://localhost:3200/health');process.exit(r.ok?0:1)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Steward Proxy ────────────────────────────────────────────────────────────
  steward-proxy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: steward:latest
    container_name: steward-proxy
    restart: unless-stopped
    networks:
      - milady-isolated
    ports:
      - "8080:8080"
    environment:
      STEWARD_PROXY_PORT: "8080"
      DATABASE_URL: "${DATABASE_URL:-postgresql://steward:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@steward-db:5432/steward}"
      STEWARD_MASTER_PASSWORD: "${STEWARD_MASTER_PASSWORD:?Set STEWARD_MASTER_PASSWORD in .env}"
      # JWT secret is required in production (auth verifyToken refuses dev fallback).
      STEWARD_JWT_SECRET: "${STEWARD_JWT_SECRET:?Set STEWARD_JWT_SECRET in .env}"
      # NODE_ENV=production makes request signing + Redis enforcement fail CLOSED,
      # so both REDIS_URL and a request-signing secret are REQUIRED here. Without
      # them the proxy returns 500/429 on 100% of traffic. See deploy/DEPLOYMENT.md.
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      STEWARD_PROXY_REQUEST_SIGNING_SECRETS: "${STEWARD_PROXY_REQUEST_SIGNING_SECRETS:?Set STEWARD_PROXY_REQUEST_SIGNING_SECRETS in .env (proxy signs/verifies every request in production)}"
      NODE_ENV: production
    command: ["bun", "run", "packages/proxy/src/index.ts"]
    depends_on:
      steward:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://localhost:8080/health');process.exit(r.ok?0:1)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Redis (rate-limit + spend enforcement) ───────────────────────────────────
  # Required by steward-proxy in production: with NODE_ENV=production and no
  # STEWARD_ALLOW_PROXY_REDIS_SOFT_FAIL=true, the proxy fails CLOSED without Redis.
  redis:
    image: redis:7-alpine
    container_name: steward-redis
    restart: unless-stopped
    networks:
      - milady-isolated
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (managed) ─────────────────────────────────────────────────────
  steward-db:
    image: postgres:16-alpine
    container_name: steward-db
    restart: unless-stopped
    networks:
      - milady-isolated
    environment:
      POSTGRES_USER: steward
      # Required: no insecure default. Set POSTGRES_PASSWORD in deploy/.env.
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      POSTGRES_DB: steward
    volumes:
      - steward-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steward"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  steward-data:
    driver: local
  steward-pgdata:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  milady-isolated:
    external: true
